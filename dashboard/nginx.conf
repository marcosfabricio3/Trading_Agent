server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gestión de rutas para Single Page App (React)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para que el frontend pueda llamar a la API de forma aislada
    # (Opcional, pero recomendado si el VPS usa una IP compartida)
    location /api/ {
        proxy_pass http://trading-agent-app:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
